name: Reset demo account

on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch: {}

jobs:
  reset:
    runs-on: ubuntu-latest
    steps:
      - name: Call demo reset endpoint
        run: |
          curl --fail-with-body -sS \
            -X POST \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            "${{ secrets.NEXT_PUBLIC_APP_URL }}/api/internal/demo/reset"
